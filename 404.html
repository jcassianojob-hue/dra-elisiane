<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Página não encontrada (404) | Dra. Elisiane Elias</title>
  <meta name="robots" content="noindex, follow"/>
  <meta property="og:title" content="Página não encontrada (404) | Dra. Elisiane Elias"/>
  <meta property="og:description" content="A página que você procurou não existe ou foi movida. Volte ao início do site da Dra. Elisiane Elias."/>
  <meta property="og:type" content="website"/>
  <meta name="theme-color" content="#2d6b5e"/>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--sage-dark:#4e8c7c;--sage-section:#2d6b5e;--sage-bg:#e8f0ee;--off-white:#f7f5f2;--text:#1a1a1a;--text-soft:#4a4a4a;--white:#fff}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--off-white);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;line-height:1.6}
    .code{font-family:'Playfair Display',Georgia,serif;font-size:clamp(4rem,14vw,7rem);font-weight:700;color:var(--sage-dark);line-height:1}
    h1{font-family:'Playfair Display',Georgia,serif;font-size:clamp(1.4rem,4vw,2rem);font-weight:700;margin:0.6rem 0 0.8rem;color:var(--text)}
    p{color:var(--text-soft);max-width:460px;margin:0 auto 2rem;font-size:0.98rem}
    .btn{background:var(--sage-dark);color:var(--white);padding:0.85rem 1.8rem;border-radius:100px;font-weight:600;font-size:0.9rem;text-decoration:none;display:inline-block;transition:background .2s}
    .btn:hover{background:var(--sage-section)}
    .links{margin-top:2rem;display:flex;gap:1.3rem;flex-wrap:wrap;justify-content:center;font-size:0.88rem}
    .links a{color:var(--sage-dark);text-decoration:none;font-weight:500}
    .links a:hover{text-decoration:underline}
    .brand{margin-bottom:2.5rem;font-family:'Playfair Display',Georgia,serif;font-weight:600;color:var(--sage-dark);font-size:1.1rem}
    .brand span{display:block;font-family:'DM Sans',sans-serif;font-weight:300;font-size:0.72rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-soft)}
  </style>
</head>
<body>
  <div class="brand">Dra. Elisiane Elias<span>Pediatria &amp; Hebiatria</span></div>
  <div class="code">404</div>
  <h1>Página não encontrada</h1>
  <p>O endereço que você procurou não existe ou foi movido. Mas o cuidado com a saúde do seu filho continua a um clique de distância.</p>
  <a href="/" class="btn">Voltar para a Home</a>
  <nav class="links" aria-label="Links principais">
    <a href="/sobre">Sobre</a>
    <a href="/pediatria">Pediatria</a>
    <a href="/hebiatria">Hebiatria</a>
    <a href="/blog">Blog</a>
    <a href="/contato">Contato</a>
  </nav>
</body>
</html>
